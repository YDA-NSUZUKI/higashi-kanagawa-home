<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>次はどっちのホーム@東神奈川</title>

<style>
body {
  margin: 0;
  font-family: system-ui, "Yu Gothic", sans-serif;
  background: #eef2f0;
  color: #222;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #f6f8f7;
}

header {
  background: linear-gradient(135deg, #007a3d, #00a650);
  color: white;
  padding: 18px 16px;
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 {
  font-size: 20px;
  margin: 0;
}

.penguin {
  font-size: 40px;
}

.toolbar {
  padding: 10px;
  display: flex;
  gap: 10px;
}

button {
  background: #007a3d;
  color: white;
  border: none;
  border-radius: 999px;
  padding: 10px 18px;
  font-weight: bold;
}

.status {
  margin: 6px 10px;
  padding: 8px;
  background: white;
  border-left: 6px solid #007a3d;
  border-radius: 10px;
  font-weight: bold;
}

.card {
  margin: 10px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
}

.card-title {
  padding: 10px;
  background: #e7f4eb;
  font-weight: bold;
}

.train {
  padding: 10px;
  border-top: 1px solid #eee;
}

.train.next {
  background: #fff4c7;
}

.train-label {
  font-size: 13px;
  font-weight: bold;
  color: #007a3d;
}

.time {
  font-size: 26px;
  font-weight: bold;
}

.platform {
  background: #007a3d;
  color: white;
  display: inline-block;
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 24px;
  font-weight: bold;
}

.platform.warn {
  background: #d98200;
}

.remaining {
  color: #c76b00;
  font-weight: bold;
}

.warning {
  color: #a65f00;
  font-size: 12px;
}
</style>
</head>

<body>
<div class="app">

<header>
  <div class="header-row">
    <h1>次はどっちのホーム@東神奈川</h1>
    <div class="penguin">🐧❔</div>
  </div>
</header>

<div class="toolbar">
  <button onclick="loadData()">更新</button>
  <div id="updated"></div>
</div>

<div id="keihinStatus" class="status"></div>
<div id="yokohamaStatus" class="status"></div>

<div class="card">
  <div class="card-title">新横浜方面</div>
  <div id="shinYokohama"></div>
</div>

<div class="card">
  <div class="card-title">品川方面</div>
  <div id="shinagawa"></div>
</div>

<div class="card">
  <div class="card-title">横浜方面</div>
  <div id="yokohama"></div>
</div>

</div>

<script>
const API_URL = "https://higashi-kanagawa-api.nsuzuki.workers.dev/";

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  render("shinYokohama", data.shinYokohama.trains);
  render("shinagawa", data.shinagawa.trains);
  render("yokohama", data.yokohama.trains);

  setStatus("keihinStatus", "京浜東北線", data.status.keihin.status);
  setStatus("yokohamaStatus", "横浜線", data.status.yokohama.status);

  document.getElementById("updated").textContent = data.updatedAt;
}

function render(id, trains) {
  const box = document.getElementById(id);
  box.innerHTML = "";

  trains.forEach((t, i) => {
    const isFallback = t.platformSource !== "列車詳細ページ";
    const urgency = i === 0 ? getUrgency(t.minutes) : "";

    const div = document.createElement("div");
    div.className = i === 0 ? "train next" : "train";

    if (urgency.includes("急げ")) {
      div.style.background = "#ffe5e5";
    }

    div.innerHTML = `
      <div class="train-label">${i === 0 ? "次発" : i === 1 ? "次々発" : "3本目"} ${urgency}</div>
      <div class="time">${t.time}</div>
      <div class="remaining">${getRemaining(t.minutes)}</div>
      <div class="platform ${isFallback ? "warn" : ""}">
        ${t.platform}番線
      </div>
      <div>${t.dest}行き</div>
      ${isFallback ? `<div class="warning">※番線未確定</div>` : ""}
    `;

    box.appendChild(div);
  });
}

function getRemaining(min) {
  const now = new Date();
  let diff = min - (now.getHours()*60 + now.getMinutes());
  if (diff < 0) diff += 1440;
  if (diff === 0) return "まもなく";
  return "あと" + diff + "分";
}

function getUrgency(min) {
  const now = new Date();
  let diff = min - (now.getHours()*60 + now.getMinutes());
  if (diff < 0) diff += 1440;

  if (diff <= 1) return "🚨急げ";
  if (diff <= 3) return "🏃急げる";
  if (diff <= 6) return "👍余裕";
  return "";
}

function setStatus(id, name, status) {
  const el = document.getElementById(id);
  el.textContent = `${name}：${status}`;

  if (status.includes("遅延") || status.includes("見合わせ")) {
    el.style.background = "#ffeaea";
    el.style.borderLeftColor = "#c62828";
  }
}

loadData();
</script>

</body>
</html>
